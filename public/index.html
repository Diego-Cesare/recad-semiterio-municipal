<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recadastro Cemitério Bom Pastor</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Cemitério Bom Pastor</h1>
      <p class="subtitle">Recadastro de Propietários</p>
      <section class="card">
        <form id="formulario">
          <label>
            Nome do propietário
            <input
              type="text"
              name="nome"
              placeholder="Nome completo do propietário"
              required
            />
          </label>

          <label>
            CPF do propietário
            <input
              type="text"
              name="cpf"
              maxlength="14"
              inputmode="numeric"
              placeholder="CPF com 11 digitos"
              required
            />
          </label>

          <label>
            Telefone para contato
            <input
              type="text"
              name="telefone"
              maxlength="14"
              inputmode="numeric"
              placeholder="(DDD)9XXXX-XXXX"
              required
            />
          </label>

          <label>
            Nome de um familiar
            <input type="text" name="familiar" required />
          </label>

          <label>
            Email
            <input
              type="email"
              name="email"
              id="email"
              inputmode="email"
              placeholder="EX: seunomedeusuario@gmail.com"
              required
            />
          </label>
          <div class="image-description">
            <p class="subtitle">Adicione as fotos de:</p>
            <p class="subtitle-item">Certidão de óbito</p>
            <p class="subtitle-item">Comprovante de cadastro</p>
          </div>
          <label for="images" class="image-add">Escolher Imagens</label>
          <input
            type="file"
            name="images"
            id="images"
            accept="image/png,image/jpeg,image/jpg"
            multiple
            style="display: none"
          />
          <p class="hint">Imagens fixadas</p>
          <div id="preview" class="preview-grid" aria-live="polite"></div>

          <button type="submit" class="button">Enviar</button>
        </form>

        <p id="status" class="status"></p>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
