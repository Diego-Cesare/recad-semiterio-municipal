<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RPCBP</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>RPCBP</h1>
      <p class="subtitle">Recadastro de Propietário Cemitério Bom Pastor</p>
      <form id="formulario">
        <fieldset>
          <legend>Dados Pessoais</legend>
          <p>Dados do propietário do terreno.</p>
          <label>
            Nome do propietário
            <input
              type="text"
              name="nome"
              placeholder="Nome completo do propietário"
              required
            />
          </label>

          <label>
            CPF do propietário
            <input
              type="text"
              name="cpf"
              maxlength="14"
              inputmode="numeric"
              placeholder="CPF com 11 digitos"
              required
            />
          </label>

          <label>
            Telefone para contato
            <input
              type="text"
              name="telefone"
              maxlength="14"
              inputmode="numeric"
              placeholder="(DDD)9XXXX-XXXX"
              required
            />
          </label>
          <label>
            Email (opicional)
            <input
              type="email"
              name="email"
              id="email"
              inputmode="email"
              placeholder="EX: seunomedeusuario@gmail.com"
            />
          </label>
        </fieldset>
        <fieldset>
          <legend>Dados do herdeiro</legend>
          <p>
            Havendo herdeiro, adicione o nome e o CPF. <br />Se não houver,
            deixe vazio.
          </p>
          <label>
            Herdeiro
            <input type="text" name="familiar" placeholder="Nome completo" />
          </label>
          <label>
            CPF do herdeiro
            <input
              type="text"
              name="cpfherdeiro"
              maxlength="14"
              inputmode="numeric"
              placeholder="CPF com 11 digitos"
            />
          </label>
        </fieldset>
        <fieldset>
          <legend>Fotos dos documentos</legend>
          <label for="images" class="image-add">Escolher Imagens</label>
          <input
            type="file"
            name="images"
            id="images"
            accept="image/png,image/jpeg,image/jpg"
            multiple
            required
            style="display: none"
          />
          <p class="hint">Imagens fixadas</p>
          <div id="preview" class="preview-grid" aria-live="polite"></div>
        </fieldset>
        <button type="submit" class="button">Enviar</button>
      </form>

      <p id="status" class="status"></p>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
