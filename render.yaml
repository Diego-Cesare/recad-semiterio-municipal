services:
  - type: web
    name: recad-semiterio-municipal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: diegocesare300491@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: diegocesare300491@gmail.com
      - key: TARGET_EMAIL
        value: diegocesare300491@gmail.com
